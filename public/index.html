<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NimeToDex · Titulky</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">NimeToDex<span>· Titulky</span></div>
    <div class="actions">
      <span id="lastRun" class="muted">—</span>
      <button id="backupBtn" class="btn-secondary" style="display:none" title="Stáhnout aktuální zálohu databáze">⬇ Záloha DB</button>
      <button id="restoreBtn" class="btn-secondary" style="display:none" title="Obnovit databázi ze zálohy (.db / .db.gz)">⬆ Obnovit DB</button>
      <input type="file" id="restoreFile" accept=".db,.gz" style="display:none" />
      <button id="dlBtn" class="btn-secondary">Stáhnout titulky</button>
      <button id="runBtn">Spustit teď</button>
    </div>
  </header>

  <main>
    <section class="cards" id="stats"></section>

    <section class="panel addbox">
      <h2>Přidat anime z hiyori</h2>
      <div class="addrow">
        <input id="addUrl" type="text" placeholder="https://hiyori.cz/anime/21389 nebo 21389" />
        <button id="addBtn">Přidat</button>
      </div>
      <label class="manual-toggle">
        <input type="checkbox" id="manualChk" />
        Ruční titulky (hiyori má anime, ale ne titulky — vytvoří prázdné záznamy pro rozsah dílů)
      </label>
      <div id="manualRow" class="addrow manual-row" style="display:none">
        <input id="epFrom" type="number" min="1" placeholder="od dílu" class="ep-inp" />
        <input id="epTo" type="number" min="1" placeholder="do dílu" class="ep-inp" />
        <input id="mLang" type="text" placeholder="jazyk (CZ)" class="ep-inp" value="CZ" />
        <input id="mGroup" type="text" placeholder="skupina" class="ep-inp" />
        <input id="mRelease" type="text" placeholder="release" class="ep-inp" />
      </div>
      <div id="addMsg" class="addmsg muted"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Titulky</h2>
        <input id="searchInput" class="search" type="text" placeholder="Hledat podle názvu anime…" />
      </div>
      <div class="table-wrap">
        <table id="subsTable">
          <thead>
            <tr>
              <th>Kdy</th><th>Anime</th><th>Ep</th><th>Jazyk</th>
              <th>Skupina</th><th>Release</th><th>Zdroj</th><th>Stav</th><th>R2</th><th></th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="prevBtn">‹ Předchozí</button>
        <span id="pageInfo" class="muted">—</span>
        <button id="nextBtn">Další ›</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Akihabara archiv <span id="akiCount" class="muted"></span></h2>
        <input id="akiSearch" class="search" type="text" placeholder="Hledat v archivu…" />
      </div>
      <div class="table-wrap">
        <table id="akiTable">
          <thead>
            <tr>
              <th></th><th>Anime</th><th>Dílů</th><th>Jazyky</th><th>Skupiny</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="akiPrevBtn">‹ Předchozí</button>
        <span id="akiPageInfo" class="muted">—</span>
        <button id="akiNextBtn">Další ›</button>
      </div>
    </section>

    <section class="panel">
      <h2>Historie běhů</h2>
      <div class="table-wrap">
        <table id="runsTable">
          <thead>
            <tr>
              <th>Start</th><th>Trvání</th><th>Karet</th><th>Anime</th>
              <th>Nové</th><th>Staženo</th><th>Extern</th><th>Chyby</th><th>Stav</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
